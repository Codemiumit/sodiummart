<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Admin - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex">
    <aside class="w-64 bg-secondary text-white min-h-screen fixed">
      <div class="p-6">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-xl font-bold">SodiumMart</span>
        </a>
      </div>
      
      <nav class="mt-6">
        <a href="/admin/" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tachometer-alt w-6"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/products.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-box w-6"></i>
          <span>Products</span>
        </a>
        <a href="/admin/orders.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-shopping-cart w-6"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/categories.html" class="flex items-center px-6 py-3 bg-primary/20 border-r-4 border-primary">
          <i class="fas fa-tags w-6"></i>
          <span>Categories</span>
        </a>
        <a href="/admin/settings.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-cog w-6"></i>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 ml-64">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-secondary">Categories</h1>
        <button onclick="openModal()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">
          <i class="fas fa-plus mr-2"></i>Add Category
        </button>
      </header>

      <div class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="categories-grid">
        </div>
      </div>
    </main>
  </div>

  <div id="category-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md m-4">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 id="modal-title" class="text-xl font-semibold">Add Category</h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <form id="category-form" class="p-6 space-y-4">
        <input type="hidden" id="category-id">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Category Name *</label>
          <input type="text" id="category-name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
          <textarea id="category-description" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Image URL</label>
          <input type="text" id="category-image" placeholder="https://..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let editingId = null;

    async function loadCategories() {
      try {
        const { categories } = await categories.getAll();
        const container = document.getElementById('categories-grid');
        
        container.innerHTML = categories.map(cat => `
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <img src="${cat.image || 'https://via.placeholder.com/300x200'}" alt="${cat.name}" class="w-full h-40 object-cover">
            <div class="p-4">
              <h3 class="font-semibold text-lg mb-1">${cat.name}</h3>
              <p class="text-gray-500 text-sm">${cat.description || 'No description'}</p>
              <div class="flex gap-2 mt-4">
                <button onclick="editCategory('${cat._id}')" class="flex-1 px-3 py-2 bg-primary/10 text-primary rounded hover:bg-primary/20">
                  <i class="fas fa-edit mr-1"></i> Edit
                </button>
                <button onclick="deleteCategory('${cat._id}')" class="px-3 py-2 bg-danger/10 text-danger rounded hover:bg-danger/20">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    }

    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add Category';
      document.getElementById('category-form').reset();
      document.getElementById('category-modal').classList.remove('hidden');
      document.getElementById('category-modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('category-modal').classList.add('hidden');
      document.getElementById('category-modal').classList.remove('flex');
    }

    async function editCategory(id) {
      try {
        const { category } = await api.get(`/categories/${id}`);
        editingId = id;
        
        document.getElementById('modal-title').textContent = 'Edit Category';
        document.getElementById('category-id').value = id;
        document.getElementById('category-name').value = category.name;
        document.getElementById('category-description').value = category.description || '';
        document.getElementById('category-image').value = category.image || '';
        
        document.getElementById('category-modal').classList.remove('hidden');
        document.getElementById('category-modal').classList.add('flex');
      } catch (error) {
        console.error('Error loading category:', error);
      }
    }

    async function deleteCategory(id) {
      if (!confirm('Are you sure you want to delete this category?')) return;
      
      try {
        await categories.delete(id);
        loadCategories();
      } catch (error) {
        alert(error.message);
      }
    }

    document.getElementById('category-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const categoryData = {
        name: document.getElementById('category-name').value,
        description: document.getElementById('category-description').value,
        image: document.getElementById('category-image').value
      };
      
      try {
        if (editingId) {
          await categories.update(editingId, categoryData);
        } else {
          await categories.create(categoryData);
        }
        closeModal();
        loadCategories();
      } catch (error) {
        alert(error.message);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      
      const user = auth.getUser();
      if (user.role !== 'admin') {
        window.location.href = '/';
        return;
      }
      
      loadCategories();
    });
  </script>
</body>
</html>
