<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-2xl font-bold text-secondary">SodiumMart</span>
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-xl shadow-sm p-8">
      <h1 class="text-2xl font-bold text-center text-secondary mb-8">Create Account</h1>
      
      <form id="register-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <input type="text" name="name" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" name="email" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
          <input type="tel" name="phone" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
          <textarea name="address" rows="2" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" name="password" required minlength="6" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg hover:bg-primary-dark font-semibold">
          Create Account
        </button>
      </form>
      
      <p class="text-center text-gray-600 mt-6">
        Already have an account? 
        <a href="/login.html" class="text-primary hover:underline font-medium">Login</a>
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: e.target.name.value,
        email: e.target.email.value,
        phone: e.target.phone.value,
        address: e.target.address.value,
        password: e.target.password.value
      };
      
      try {
        await auth.register(formData.name, formData.email, formData.password, formData.phone, formData.address);
        window.location.href = '/';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
