<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex">
    <aside class="w-64 bg-secondary text-white min-h-screen fixed">
      <div class="p-6">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-xl font-bold">SodiumMart</span>
        </a>
      </div>
      
      <nav class="mt-6">
        <a href="/admin/" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tachometer-alt w-6"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/products.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-box w-6"></i>
          <span>Products</span>
        </a>
        <a href="/admin/orders.html" class="flex items-center px-6 py-3 bg-primary/20 border-r-4 border-primary">
          <i class="fas fa-shopping-cart w-6"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/categories.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tags w-6"></i>
          <span>Categories</span>
        </a>
        <a href="/admin/settings.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-cog w-6"></i>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 ml-64">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-secondary">Orders</h1>
        <select id="status-filter" onchange="loadOrders()" class="px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </header>

      <div class="p-8">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Order ID</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Customer</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Items</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Total</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Status</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Date</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Actions</th>
              </tr>
            </thead>
            <tbody id="orders-list">
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="order-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-xl font-semibold">Order Details</h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <div id="order-details" class="p-6">
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function loadOrders() {
      try {
        const status = document.getElementById('status-filter').value;
        const { orders } = await orders.getAll({ status });
        const tbody = document.getElementById('orders-list');
        
        tbody.innerHTML = orders.map(order => `
          <tr class="border-b hover:bg-gray-50">
            <td class="py-3 px-4 font-mono">#${order._id.slice(-8).toUpperCase()}</td>
            <td class="py-3 px-4">
              <p class="font-medium">${order.user?.name || 'N/A'}</p>
              <p class="text-sm text-gray-500">${order.user?.email || ''}</p>
            </td>
            <td class="py-3 px-4">${order.items.length} items</td>
            <td class="py-3 px-4 font-semibold">$${order.totalAmount.toFixed(2)}</td>
            <td class="py-3 px-4">
              <select onchange="updateStatus('${order._id}', this.value)" class="px-2 py-1 border rounded text-sm ${
                order.orderStatus === 'delivered' ? 'bg-green-100 text-green-800' :
                order.orderStatus === 'shipped' ? 'bg-purple-100 text-purple-800' :
                order.orderStatus === 'processing' ? 'bg-blue-100 text-blue-800' :
                order.orderStatus === 'cancelled' ? 'bg-red-100 text-red-800' :
                'bg-yellow-100 text-yellow-800'
              }">
                <option value="pending" ${order.orderStatus === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="processing" ${order.orderStatus === 'processing' ? 'selected' : ''}>Processing</option>
                <option value="shipped" ${order.orderStatus === 'shipped' ? 'selected' : ''}>Shipped</option>
                <option value="delivered" ${order.orderStatus === 'delivered' ? 'selected' : ''}>Delivered</option>
                <option value="cancelled" ${order.orderStatus === 'cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </td>
            <td class="py-3 px-4 text-gray-500">${new Date(order.createdAt).toLocaleDateString()}</td>
            <td class="py-3 px-4">
              <button onclick="viewOrder('${order._id}')" class="text-primary hover:text-primary-dark">
                <i class="fas fa-eye"></i>
              </button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    }

    async function viewOrder(id) {
      try {
        const { order } = await orders.getById(id);
        
        document.getElementById('order-details').innerHTML = `
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <p class="text-sm text-gray-500">Order ID</p>
                <p class="font-mono font-semibold">#${order._id.slice(-8).toUpperCase()}</p>
              </div>
              <div>
                <p class="text-sm text-gray-500">Date</p>
                <p class="font-semibold">${new Date(order.createdAt).toLocaleString()}</p>
              </div>
            </div>
            
            <div class="border-t pt-4">
              <p class="text-sm text-gray-500 mb-2">Customer</p>
              <p class="font-medium">${order.user?.name || 'N/A'}</p>
              <p class="text-sm">${order.user?.email || ''}</p>
            </div>
            
            <div class="border-t pt-4">
              <p class="text-sm text-gray-500 mb-2">Shipping Address</p>
              <p>${order.shippingAddress.name}</p>
              <p class="text-sm">${order.shippingAddress.address}</p>
              <p class="text-sm">${order.shippingAddress.city}, ${order.shippingAddress.zip}</p>
              <p class="text-sm">${order.shippingAddress.phone}</p>
            </div>
            
            <div class="border-t pt-4">
              <p class="text-sm text-gray-500 mb-2">Items</p>
              ${order.items.map(item => `
                <div class="flex justify-between py-2">
                  <span>${item.name} x ${item.quantity}</span>
                  <span class="font-medium">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
              `).join('')}
            </div>
            
            <div class="border-t pt-4 flex justify-between text-lg font-semibold">
              <span>Total</span>
              <span class="text-primary">$${order.totalAmount.toFixed(2)}</span>
            </div>
          </div>
        `;
        
        document.getElementById('order-modal').classList.remove('hidden');
        document.getElementById('order-modal').classList.add('flex');
      } catch (error) {
        console.error('Error loading order:', error);
      }
    }

    function closeModal() {
      document.getElementById('order-modal').classList.add('hidden');
      document.getElementById('order-modal').classList.remove('flex');
    }

    async function updateStatus(id, status) {
      try {
        await orders.updateStatus(id, status);
        loadOrders();
      } catch (error) {
        alert(error.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      
      const user = auth.getUser();
      if (user.role !== 'admin') {
        window.location.href = '/';
        return;
      }
      
      loadOrders();
    });
  </script>
</body>
</html>
