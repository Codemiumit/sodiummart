<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Admin - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex">
    <aside class="w-64 bg-secondary text-white min-h-screen fixed">
      <div class="p-6">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-xl font-bold">SodiumMart</span>
        </a>
      </div>
      
      <nav class="mt-6">
        <a href="/admin/" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tachometer-alt w-6"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/products.html" class="flex items-center px-6 py-3 bg-primary/20 border-r-4 border-primary">
          <i class="fas fa-box w-6"></i>
          <span>Products</span>
        </a>
        <a href="/admin/orders.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-shopping-cart w-6"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/categories.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tags w-6"></i>
          <span>Categories</span>
        </a>
        <a href="/admin/settings.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-cog w-6"></i>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 ml-64">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-secondary">Products</h1>
        <button onclick="openModal()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">
          <i class="fas fa-plus mr-2"></i>Add Product
        </button>
      </header>

      <div class="p-8">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Product</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Category</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Price</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Stock</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Featured</th>
                <th class="text-left py-3 px-4 font-medium text-gray-500">Actions</th>
              </tr>
            </thead>
            <tbody id="products-list">
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="product-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 id="modal-title" class="text-xl font-semibold">Add Product</h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <form id="product-form" class="p-6 space-y-4">
        <input type="hidden" id="product-id">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Product Name *</label>
          <input type="text" id="product-name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
          <select id="product-category" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
          </select>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Price *</label>
            <input type="number" id="product-price" step="0.01" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Sale Price</label>
            <input type="number" id="product-sale-price" step="0.01" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Stock *</label>
            <input type="number" id="product-stock" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Featured</label>
            <select id="product-featured" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
              <option value="false">No</option>
              <option value="true">Yes</option>
            </select>
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Description *</label>
          <textarea id="product-description" rows="4" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Image URL</label>
          <input type="text" id="product-image" placeholder="https://..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div class="flex justify-end gap-3 pt-4">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let editingId = null;

    async function loadProducts() {
      try {
        const { products } = await products.getAll({ limit: 100 });
        const tbody = document.getElementById('products-list');
        
        tbody.innerHTML = products.map(product => `
          <tr class="border-b hover:bg-gray-50">
            <td class="py-3 px-4">
              <div class="flex items-center gap-3">
                <img src="${product.images?.[0] || 'https://via.placeholder.com/50'}" class="w-12 h-12 object-cover rounded">
                <span class="font-medium">${product.name}</span>
              </div>
            </td>
            <td class="py-3 px-4">${product.category?.name || 'Uncategorized'}</td>
            <td class="py-3 px-4">
              ${product.salePrice ? 
                `<span class="text-primary font-semibold">$${product.salePrice}</span>
                 <span class="text-gray-400 line-through text-sm ml-2">$${product.price}</span>` : 
                `<span class="font-semibold">$${product.price}</span>`}
            </td>
            <td class="py-3 px-4">${product.stock}</td>
            <td class="py-3 px-4">
              ${product.featured ? '<span class="text-primary"><i class="fas fa-star"></i></span>' : '-'}
            </td>
            <td class="py-3 px-4">
              <button onclick="editProduct('${product._id}')" class="text-primary hover:text-primary-dark mr-3">
                <i class="fas fa-edit"></i>
              </button>
              <button onclick="deleteProduct('${product._id}')" class="text-danger hover:text-red-700">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading products:', error);
      }
    }

    async function loadCategories() {
      try {
        const { categories } = await categories.getAll();
        const select = document.getElementById('product-category');
        select.innerHTML = categories.map(cat => `<option value="${cat._id}">${cat.name}</option>`).join('');
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    }

    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add Product';
      document.getElementById('product-form').reset();
      document.getElementById('product-modal').classList.remove('hidden');
      document.getElementById('product-modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('product-modal').classList.add('hidden');
      document.getElementById('product-modal').classList.remove('flex');
    }

    async function editProduct(id) {
      try {
        const { product } = await products.getById(id);
        editingId = id;
        
        document.getElementById('modal-title').textContent = 'Edit Product';
        document.getElementById('product-id').value = id;
        document.getElementById('product-name').value = product.name;
        document.getElementById('product-price').value = product.price;
        document.getElementById('product-sale-price').value = product.salePrice || '';
        document.getElementById('product-stock').value = product.stock;
        document.getElementById('product-description').value = product.description;
        document.getElementById('product-image').value = product.images?.[0] || '';
        document.getElementById('product-featured').value = product.featured.toString();
        document.getElementById('product-category').value = product.category?._id || '';
        
        document.getElementById('product-modal').classList.remove('hidden');
        document.getElementById('product-modal').classList.add('flex');
      } catch (error) {
        console.error('Error loading product:', error);
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product?')) return;
      
      try {
        await products.delete(id);
        loadProducts();
      } catch (error) {
        alert(error.message);
      }
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const productData = {
        name: document.getElementById('product-name').value,
        price: parseFloat(document.getElementById('product-price').value),
        salePrice: document.getElementById('product-sale-price').value ? parseFloat(document.getElementById('product-sale-price').value) : null,
        stock: parseInt(document.getElementById('product-stock').value),
        description: document.getElementById('product-description').value,
        images: document.getElementById('product-image').value ? [document.getElementById('product-image').value] : [],
        featured: document.getElementById('product-featured').value === 'true',
        category: document.getElementById('product-category').value
      };
      
      try {
        if (editingId) {
          await products.update(editingId, productData);
        } else {
          await products.create(productData);
        }
        closeModal();
        loadProducts();
      } catch (error) {
        alert(error.message);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      
      const user = auth.getUser();
      if (user.role !== 'admin') {
        window.location.href = '/';
        return;
      }
      
      loadProducts();
      loadCategories();
    });
  </script>
</body>
</html>
