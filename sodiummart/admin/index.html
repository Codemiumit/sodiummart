<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex">
    <aside class="w-64 bg-secondary text-white min-h-screen fixed">
      <div class="p-6">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-xl font-bold">SodiumMart</span>
        </a>
      </div>
      
      <nav class="mt-6">
        <a href="/admin/" class="flex items-center px-6 py-3 bg-primary/20 border-r-4 border-primary">
          <i class="fas fa-tachometer-alt w-6"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/products.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-box w-6"></i>
          <span>Products</span>
        </a>
        <a href="/admin/orders.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-shopping-cart w-6"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/categories.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-tags w-6"></i>
          <span>Categories</span>
        </a>
        <a href="/admin/settings.html" class="flex items-center px-6 py-3 hover:bg-white/10">
          <i class="fas fa-cog w-6"></i>
          <span>Settings</span>
        </a>
        <a href="/" class="flex items-center px-6 py-3 hover:bg-white/10 mt-8 text-gray-400">
          <i class="fas fa-arrow-left w-6"></i>
          <span>Back to Store</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 ml-64">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
        <h1 class="text-xl font-semibold text-secondary">Dashboard</h1>
        <div class="flex items-center gap-4">
          <span class="text-gray-600">Admin</span>
          <button onclick="logout()" class="text-danger hover:underline">Logout</button>
        </div>
      </header>

      <div class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">Total Products</p>
                <p id="stat-products" class="text-3xl font-bold text-secondary">0</p>
              </div>
              <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center">
                <i class="fas fa-box text-primary text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">Total Orders</p>
                <p id="stat-orders" class="text-3xl font-bold text-secondary">0</p>
              </div>
              <div class="w-12 h-12 bg-accent/10 rounded-full flex items-center justify-center">
                <i class="fas fa-shopping-cart text-accent text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">Total Users</p>
                <p id="stat-users" class="text-3xl font-bold text-secondary">0</p>
              </div>
              <div class="w-12 h-12 bg-success/10 rounded-full flex items-center justify-center">
                <i class="fas fa-users text-success text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm">Total Revenue</p>
                <p id="stat-revenue" class="text-3xl font-bold text-secondary">$0</p>
              </div>
              <div class="w-12 h-12 bg-danger/10 rounded-full flex items-center justify-center">
                <i class="fas fa-dollar-sign text-danger text-xl"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-xl font-semibold mb-4">Recent Orders</h2>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b">
                  <th class="text-left py-3 px-4 font-medium text-gray-500">Order ID</th>
                  <th class="text-left py-3 px-4 font-medium text-gray-500">Customer</th>
                  <th class="text-left py-3 px-4 font-medium text-gray-500">Amount</th>
                  <th class="text-left py-3 px-4 font-medium text-gray-500">Status</th>
                  <th class="text-left py-3 px-4 font-medium text-gray-500">Date</th>
                </tr>
              </thead>
              <tbody id="recent-orders">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function loadStats() {
      try {
        const { stats } = await api.get('/auth/admin/stats');
        document.getElementById('stat-products').textContent = stats.products;
        document.getElementById('stat-orders').textContent = stats.orders;
        document.getElementById('stat-users').textContent = stats.users;
        document.getElementById('stat-revenue').textContent = '$' + stats.totalSales.toFixed(2);
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    async function loadRecentOrders() {
      try {
        const { stats } = await orders.getStats();
        const tbody = document.getElementById('recent-orders');
        
        tbody.innerHTML = stats.recentOrders.map(order => `
          <tr class="border-b hover:bg-gray-50">
            <td class="py-3 px-4 font-mono">#${order._id.slice(-8).toUpperCase()}</td>
            <td class="py-3 px-4">${order.user?.name || 'N/A'}</td>
            <td class="py-3 px-4 font-semibold">$${order.totalAmount.toFixed(2)}</td>
            <td class="py-3 px-4">
              <span class="px-2 py-1 rounded text-sm ${
                order.orderStatus === 'delivered' ? 'bg-green-100 text-green-800' :
                order.orderStatus === 'shipped' ? 'bg-purple-100 text-purple-800' :
                order.orderStatus === 'processing' ? 'bg-blue-100 text-blue-800' :
                'bg-yellow-100 text-yellow-800'
              }">${order.orderStatus}</span>
            </td>
            <td class="py-3 px-4 text-gray-500">${new Date(order.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    }

    function logout() {
      auth.logout();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      
      const user = auth.getUser();
      if (user.role !== 'admin') {
        window.location.href = '/';
        return;
      }
      
      loadStats();
      loadRecentOrders();
    });
  </script>
</body>
</html>
