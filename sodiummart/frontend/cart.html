<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - SodiumMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0EA5E9',
            'primary-dark': '#0284C7',
            secondary: '#1E293B',
            accent: '#F59E0B',
            success: '#10B981',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">S</span>
          </div>
          <span class="text-2xl font-bold text-secondary">SodiumMart</span>
        </a>
        
        <nav class="hidden md:flex items-center space-x-8">
          <a href="/" class="text-gray-700 hover:text-primary font-medium">Home</a>
          <a href="/products.html" class="text-gray-700 hover:text-primary font-medium">Products</a>
        </nav>

        <div class="flex items-center space-x-4">
          <div id="auth-buttons">
            <a href="/login.html" class="px-4 py-2 text-gray-700 hover:text-primary font-medium">Login</a>
            <a href="/register.html" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">Sign Up</a>
          </div>
          <div id="user-menu" class="hidden relative">
            <button onclick="toggleUserMenu()" class="flex items-center space-x-2 text-gray-700">
              <i class="fas fa-user-circle text-xl"></i>
              <span id="user-name"></span>
            </button>
            <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2">
              <a href="/orders.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-50"><i class="fas fa-box mr-2"></i>My Orders</a>
              <button onclick="logout()" class="w-full text-left px-4 py-2 text-danger hover:bg-gray-50"><i class="fas fa-sign-out-alt mr-2"></i>Logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-secondary mb-8">Shopping Cart</h1>
    
    <div class="flex flex-col lg:flex-row gap-8">
      <div class="lg:w-2/3">
        <div id="cart-items" class="space-y-4">
        </div>
      </div>
      
      <div class="lg:w-1/3">
        <div class="bg-white rounded-xl shadow-sm p-6 sticky top-24">
          <h2 class="text-xl font-semibold mb-4">Order Summary</h2>
          
          <div class="border-t border-b py-4 mb-4">
            <div class="flex justify-between mb-2">
              <span class="text-gray-600">Subtotal</span>
              <span class="font-semibold" id="cart-subtotal">$0.00</span>
            </div>
            <div class="flex justify-between mb-2">
              <span class="text-gray-600">Shipping</span>
              <span class="text-success">Free</span>
            </div>
          </div>
          
          <div class="flex justify-between mb-6">
            <span class="text-lg font-semibold">Total</span>
            <span class="text-2xl font-bold text-primary" id="cart-total">$0.00</span>
          </div>
          
          <a href="/checkout.html" class="block w-full bg-primary text-white text-center py-3 rounded-lg hover:bg-primary-dark font-semibold mb-4">
            Proceed to Checkout
          </a>
          
          <a href="/products.html" class="block text-center text-primary hover:underline">
            Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-secondary text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p>&copy; 2024 SodiumMart. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    function updateCartTotals() {
      const subtotal = getCartTotal();
      document.getElementById('cart-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('cart-total').textContent = `$${subtotal.toFixed(2)}`;
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 bg-white rounded-xl">
            <i class="fas fa-shopping-cart text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-600 mb-2">Your cart is empty</h3>
            <p class="text-gray-500 mb-4">Looks like you haven't added anything to your cart yet.</p>
            <a href="/products.html" class="inline-block px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">Start Shopping</a>
          </div>
        `;
        updateCartTotals();
        return;
      }
      
      container.innerHTML = cart.map(item => {
        const price = item.product.salePrice || item.product.price;
        const image = item.product.images && item.product.images.length > 0 
          ? item.product.images[0] 
          : 'https://via.placeholder.com/100x100?text=No+Image';
        
        return `
          <div class="bg-white p-4 rounded-xl shadow-sm flex items-center gap-4">
            <a href="/product-detail.html?slug=${item.product.slug}">
              <img src="${image}" alt="${item.product.name}" class="w-24 h-24 object-cover rounded-lg">
            </a>
            <div class="flex-1">
              <a href="/product-detail.html?slug=${item.product.slug}" class="font-semibold text-lg text-secondary hover:text-primary">${item.product.name}</a>
              <p class="text-primary font-bold">$${price.toFixed(2)}</p>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="updateQuantity('${item.product._id}', ${item.quantity - 1})" class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300 flex items-center justify-center">-</button>
              <span class="w-8 text-center font-medium">${item.quantity}</span>
              <button onclick="updateQuantity('${item.product._id}', ${item.quantity + 1})" class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300 flex items-center justify-center">+</button>
            </div>
            <div class="text-right">
              <p class="font-bold text-lg">$${(price * item.quantity).toFixed(2)}</p>
              <button onclick="removeFromCart('${item.product._id}')" class="text-danger text-sm hover:underline">Remove</button>
            </div>
          </div>
        `;
      }).join('');
      
      updateCartTotals();
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateCartCount();
      updateAuthUI();
      renderCart();
    });
  </script>
</body>
</html>
